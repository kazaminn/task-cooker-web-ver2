name: AI CI

on:
  push:
    branches-ignore:
      - master

concurrency:
  group: ai-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-check:
    runs-on: ubuntu-latest

    env:
      # Example (used in other projects)
      # VITE_API_BASE_URL: http://localhost:3000
      BASE_REF: origin/master

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
          cache: 'pnpm'

      - name: Cache Vitest
        uses: actions/cache@v4
        with:
          path: .vitest
          key: vitest-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: AI checks (auto-fix + related tests)
        run: pnpm run ai:check

      - name: Ensure no uncommitted changes (format/lint fixes must be committed)
        run: git diff --exit-code

      # NOTE: Storybook tests are intentionally NOT run in CI
      # - name: Storybook Test
      #   run: npm run storybook:test
